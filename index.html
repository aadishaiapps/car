<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>APEX-07 // RC CAR TELEMETRY OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
        
        body { font-family: 'Rajdhani', sans-serif; background: #000; color: #fff; overflow: hidden; touch-action: none; user-select: none; }
        .hud-font { font-family: 'Orbitron', sans-serif; }
        
        /* Car Image Background - restricted ONLY to calibration screen */
        .apex-bg {
            background-image: url('apex.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(0, 0, 0, 0.6);
            background-blend-mode: darken;
        }

        .hidden-state { display: none !important; }
        .dial-ring { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.05s linear, stroke 0.2s ease; }
        .glow { filter: drop-shadow(0 0 6px currentColor); }
        .error-msg { color: #ef4444; font-size: 0.8rem; display: none; text-align: left; }
    </style>
</head>
<body class="antialiased bg-slate-950">

    <div id="authScreen" class="h-screen w-full flex flex-col justify-center items-center p-6 z-50 absolute inset-0 bg-slate-950">
        <div class="w-full max-w-sm p-8 bg-slate-900/50 border border-cyan-500/30 rounded-xl shadow-2xl text-center backdrop-blur-md">
            <h1 class="text-4xl font-black text-cyan-400 mb-1 hud-font tracking-wider glow">APEX-07</h1>
            <p class="text-[10px] uppercase text-cyan-500/60 tracking-[0.3em] mb-8">RC Car Telemetry System</p>
            
            <div id="roleSelectArea" class="space-y-4">

    </script>
</body>
</html>
