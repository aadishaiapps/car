<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>APEX-07 // Fluid Telemetry OS — Demo</title>

  <!-- Fonts & minimal Tailwind-like utilities (kept inline for portability) -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* --- Minimal HUD styling (self-contained) --- */
    :root{--bg:#020617;--panel:#0b1220;--accent:#06b6d4;--muted:#94a3b8}
    html,body{height:100%;margin:0;background:var(--bg);color:#f8fafc;font-family:Oswald,Arial,sans-serif;overflow:hidden}
    .center{display:flex;align-items:center;justify-content:center}
    .hidden{display:none}
    .hud{box-sizing:border-box;padding:12px;height:100%;display:flex;flex-direction:column;gap:10px}
    .topbar{display:flex;gap:8px;align-items:center;justify-content:space-between;background:rgba(10,14,20,0.6);border:1px solid rgba(6,182,212,0.08);padding:8px;border-radius:10px}
    .badge{padding:6px 10px;border-radius:8px;font-weight:700;font-size:12px}
    .btn{background:#0f1724;color:#e6f6f9;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);cursor:pointer}
    .main{display:flex;flex:1;gap:12px;min-height:0}
    .left{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0}
    .videoPanel{position:relative;border-radius:12px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,0.03);flex:1;min-height:0}
    video{width:100%;height:100%;object-fit:cover;display:block}
    canvas#detectionCanvas{position:absolute;left:0;top:0;z-index:40;pointer-events:none}
    .statsRow{display:flex;gap:8px}
    .stat{background:rgba(8,12,18,0.6);padding:8px;border-radius:8px;min-width:120px;text-align:left}
    .right{width:260px;display:flex;flex-direction:column;gap:10px}
    .dial{background:linear-gradient(180deg,#07101a,#0b1220);border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;border:1px solid rgba(255,255,255,0.03)}
    svg{width:100%;height:auto;display:block}
    .speedText{font-family:Orbitron,monospace;font-size:34px;color:var(--accent);font-weight:900}
    .insights{background:linear-gradient(135deg,rgba(6,182,212,0.04),rgba(139,92,246,0.03));padding:10px;border-radius:10px;overflow:auto;max-height:220px;border:1px solid rgba(255,255,255,0.02)}
    .insight{padding:8px;border-radius:6px;margin-bottom:6px;font-size:13px}
    .insight.warning{background:rgba(245,158,11,0.06);border-left:4px solid #f59e0b}
    .insight.danger{background:rgba(239,68,68,0.06);border-left:4px solid #ef4444}
    .insight.success{background:rgba(16,185,129,0.06);border-left:4px solid #10b981}
    .small{font-size:12px;color:var(--muted)}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200}
    .card{background:#07101a;padding:16px;border-radius:12px;border:1px solid rgba(6,182,212,0.06);width:360px}
    input[type=number],input[type=text],input[type=password]{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:#07101a;color:#e6f6f9}
    .footer{font-size:12px;color:var(--muted);text-align:center;padding:6px}
    @media (max-width:900px){.right{display:none}.main{flex-direction:column}}
  </style>
</head>
<body>
  <div id="app" class="hud">
    <div class="topbar">
      <div style="display:flex;gap:8px;align-items:center">
        <div class="badge" id="telemetryId">ID: ----</div>
        <div class="badge" id="gpuBadge">GPU: INIT</div>
        <div class="badge" id="aiBadge">AI: IDLE</div>
        <div class="small" style="margin-left:8px">APEX-07 • Chassis Telemetry Core</div>
      </div>
      <div class="controls">
        <button id="findBtn" class="btn">Find</button>
        <button id="previewBtn" class="btn">Preview</button>
        <button id="settingsBtn" class="btn">Settings</button>
        <button id="disconnectBtn" class="btn" style="background:#3b0f0f">Disconnect</button>
      </div>
    </div>

    <div class="main">
      <div class="left">
        <div class="videoPanel" id="videoPanel">
          <video id="cameraStream" autoplay playsinline muted></video>
          <canvas id="detectionCanvas"></canvas>
        </div>

        <div class="statsRow">
          <div class="stat">
            <div class="small">Attitude</div>
            <div style="display:flex;gap:12px;margin-top:6px">
              <div><div class="small">PITCH</div><div id="pitchText" style="font-weight:800">0.0°</div></div>
              <div><div class="small">ROLL</div><div id="rollText" style="font-weight:800">0.0°</div></div>
            </div>
          </div>

          <div class="stat">
            <div class="small">Proximity</div>
            <div style="margin-top:6px"><div id="gapPercent" style="font-weight:800">100.00%</div></div>
          </div>

          <div class="stat">
            <div class="small">Detections</div>
            <div style="margin-top:6px"><div id="detectionCount" style="font-weight:800">0</div></div>
          </div>
        </div>

        <div class="insights" id="aiInsights">
          <div class="small">AI Engine: Awaiting sensor data...</div>
        </div>
      </div>

      <div class="right">
        <div class="dial">
          <svg viewBox="0 0 100 100" style="transform:rotate(-90deg);width:100%">
            <circle cx="50" cy="50" r="41" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="7"></circle>
            <circle id="speedDial" cx="50" cy="50" r="41" stroke="#ffffff" stroke-width="7" stroke-dasharray="258" stroke-dashoffset="258" fill="none" style="transition:stroke-dashoffset 0.12s linear"></circle>
          </svg>
          <div class="center" style="flex-direction:column">
            <div class="speedText" id="speedText">0</div>
            <div class="small">KM/H</div>
            <div class="small" id="speedSource">MOTION</div>
          </div>
        </div>

        <div class="dial" style="padding:10px">
          <div class="small">Engine Power</div>
          <div id="rpmText" style="font-weight:900;color:#f59e0b">0 RPM</div>
        </div>

        <div class="dial" style="padding:10px">
          <div class="small">System Controls</div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="calibBtn" class="btn">Calibrate</button>
            <button id="resetBtn" class="btn">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Created By - Aadish Madhav | GPU AI + Motion Sensor</div>
  </div>

  <!-- Settings Modal (hidden by default) -->
  <div id="settingsModal" class="modal hidden">
    <div class="card">
      <h3 style="margin:0 0 8px 0;color:var(--accent)">SYSTEM SETTINGS</h3>
      <label class="small">Top Speed Bound (KM/H)</label>
      <input id="inputTopSpeed" type="number" value="30" />
      <label class="small" style="margin-top:8px">AI Sensitivity (0-100)</label>
      <input id="inputAISensitivity" type="number" value="75" />
      <label class="small" style="margin-top:8px">Detection Threshold (0-1)</label>
      <input id="inputDetectionThreshold" type="number" step="0.05" min="0" max="1" value="0.5" />
      <label class="small" style="margin-top:8px">Motion Speed Factor (0.1-2.0)</label>
      <input id="inputMotionFactor" type="number" step="0.1" min="0.1" max="2.0" value="1.0" />
      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="saveSettings" class="btn">Save</button>
        <button id="closeSettings" class="btn">Close</button>
      </div>
    </div>
  </div>

  <!-- Minimal scripts: TensorFlow + COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <script>
  /* ============================
     Config & Utilities
     ============================ */
  const ConfigEngine = {
    auth: { password: "AL007", sessionId: "0000", selectedRole: null },
    state: { gear: 'FWD', currentSpeed: 0.0, activeFacingMode: 'environment' },
    performance: { topSpeed: 30.0, aiSensitivity: 75, detectionThreshold: 0.5, motionFactor: 1.0 }
  };

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function lerp(current, target, factor){ return current + (target - current) * factor; }

  /* ============================
     GPU Accelerator with fallback
     ============================ */
  const GPUAccelerator = {
    backend: 'cpu',
    async initialize(){
      try { await tf.setBackend('webgl'); await tf.ready(); this.backend='webgl'; }
      catch(e1){
        try { await tf.setBackend('wasm'); await tf.ready(); this.backend='wasm'; }
        catch(e2){ await tf.setBackend('cpu'); this.backend='cpu'; }
      }
      document.getElementById('gpuBadge').textContent = 'GPU: ' + this.backend.toUpperCase();
      return this.backend;
    }
  };

  /* ============================
     Motion Speedometer (with LERP smoothing)
     ============================ */
  const MotionSpeedometer = {
    accelHistory: [], speedEstimate: 0, maxHistorySize: 50, motionFactor: 1.0,
    recordAcceleration(x,y,z){
      const magnitude = Math.sqrt(x*x + y*y + z*z);
      const netAccel = Math.max(0, magnitude - 9.8);
      this.accelHistory.push(netAccel);
      if(this.accelHistory.length > this.maxHistorySize) this.accelHistory.shift();
      this.updateSpeedEstimate();
    },
    updateSpeedEstimate(){
      if(!this.accelHistory.length) return;
      const avgAccel = this.accelHistory.reduce((a,b)=>a+b,0)/this.accelHistory.length;
      const deltaTime = 0.1; // seconds
      const targetSpeed = avgAccel * deltaTime * this.motionFactor * 10;
      this.speedEstimate = lerp(this.speedEstimate, targetSpeed, 0.075);
      return Math.max(0, this.speedEstimate);
    },
    getSpeed(){ return Math.round(this.speedEstimate * 100) / 100; },
    clear(){ this.accelHistory = []; this.speedEstimate = 0; }
  };

  /* ============================
     Enhanced Object Detection AI
     - model retry with backoff
     - dynamic thresholding
     - temporal smoothing/tracking
     - safe canvas guards
     ============================ */
  const ObjectDetectionAI = {
    model: null, isModelLoaded: false, detectionThreshold: 0.5,
    lastDetections: [], detectionHistory: [], maxHistorySize: 30,
    async initialize(retries = 3){
      for(let i=0;i<retries;i++){
        try {
          console.log('Loading COCO-SSD model (attempt', i+1, ')');
          this.model = await cocoSsd.load();
          this.isModelLoaded = true;
          console.log('COCO-SSD loaded');
          document.getElementById('aiBadge').textContent = 'AI: READY';
          return true;
        } catch(err){
          console.warn('Model load failed, retrying...', err);
          await new Promise(r => setTimeout(r, 1000 * (i+1)));
        }
      }
      console.error('Model failed to load after retries');
      document.getElementById('aiBadge').textContent = 'AI: ERROR';
      return false;
    },
    async detectObjects(videoEl){
      if(!this.isModelLoaded || !this.model) return [];
      if(!videoEl || videoEl.videoWidth === 0 || videoEl.videoHeight === 0) return [];
      try {
        // Adaptive threshold based on scene complexity
        const sceneComplexity = this.detectionHistory.flat().length || 0;
        this.detectionThreshold = clamp(ConfigEngine.performance.detectionThreshold + (sceneComplexity > 10 ? 0.1 : -0.05), 0.2, 0.85);

        const raw = await this.model.estimateObjects(videoEl, 100, this.detectionThreshold);
        this.detectionHistory.push(raw);
        if(this.detectionHistory.length > this.maxHistorySize) this.detectionHistory.shift();

        const mapped = raw.map(p => ({
          class: p.class,
          score: Math.round(p.score * 100),
          bbox: p.bbox,
          confidence: p.score > 0.8 ? 'high' : p.score > 0.6 ? 'medium' : 'low'
        })).sort((a,b)=>b.score-a.score);

        // Temporal smoothing: match by class and bbox proximity
        const smoothed = mapped.map(det => {
          const prev = this.lastDetections.find(d => d.class === det.class && bboxIoU(d.bbox, det.bbox) > 0.2);
          if(prev){
            det.score = Math.round((det.score + prev.score) / 2);
            // smooth bbox
            det.bbox = [
              lerp(prev.bbox[0], det.bbox[0], 0.4),
              lerp(prev.bbox[1], det.bbox[1], 0.4),
              lerp(prev.bbox[2], det.bbox[2], 0.4),
              lerp(prev.bbox[3], det.bbox[3], 0.4)
            ];
          }
          return det;
        });

        this.lastDetections = smoothed;
        return smoothed;
      } catch(e){
        console.error('Detection error', e);
        return [];
      }
    },
    drawDetections(canvas, detections, videoEl){
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      if(videoEl.videoWidth === 0 || videoEl.videoHeight === 0) return;
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      detections.forEach(det => {
        const [x,y,w,h] = det.bbox;
        const color = det.confidence === 'high' ? '#10b981' : det.confidence === 'medium' ? '#f59e0b' : '#ef4444';
        ctx.strokeStyle = color; ctx.lineWidth = det.confidence === 'high' ? 3 : 2;
        ctx.shadowColor = color; ctx.shadowBlur = 8;
        ctx.strokeRect(x, y, w, h);
        const label = `${det.class} ${det.score}%`;
        ctx.fillStyle = color;
        ctx.fillRect(x, y - 22, ctx.measureText(label).width + 12, 18);
        ctx.fillStyle = '#f8fafc';
        ctx.font = 'bold 12px Orbitron, monospace';
        ctx.fillText(label, x + 6, y - 8);
      });
    },
    getTopDetections(count = 5){ return this.lastDetections.slice(0, count); }
  };

  /* Utility: Intersection over Union for bbox matching (approx) */
  function bboxIoU(a, b){
    if(!a || !b) return 0;
    const [ax,ay,aw,ah] = a;
    const [bx,by,bw,bh] = b;
    const ax2 = ax + aw, ay2 = ay + ah, bx2 = bx + bw, by2 = by + bh;
    const ix = Math.max(0, Math.min(ax2, bx2) - Math.max(ax, bx));
    const iy = Math.max(0, Math.min(ay2, by2) - Math.max(ay, by));
    const inter = ix * iy;
    const union = aw * ah + bw * bh - inter;
    return union === 0 ? 0 : inter / union;
  }

  /* ============================
     Sensor AI (stability, risk insights)
     ============================ */
  const SensorAI = {
    buffer: { speeds: [], pitches: [], rolls: [], accels: [] },
    predictions: { riskLevel: 'LOW', stabilityScore: 100, driftWarning: false },
    recordSensorData(speed, pitch, roll, accelMag){
      this.buffer.speeds.push(speed); this.buffer.pitches.push(pitch); this.buffer.rolls.push(roll); this.buffer.accels.push(accelMag);
      if(this.buffer.speeds.length > 40){
        this.buffer.speeds.shift(); this.buffer.pitches.shift(); this.buffer.rolls.shift(); this.buffer.accels.shift();
      }
    },
    analyzePatterns(){
      if(this.buffer.speeds.length < 5) return;
      const speeds = this.buffer.speeds;
      const accels = this.buffer.accels;
      const rolls = this.buffer.rolls;
      const pitches = this.buffer.pitches;
      const speedVariance = Math.max(...speeds) - Math.min(...speeds);
      const isSkidding = speedVariance > 15 && accels[accels.length - 1] > 12;
      const maxRoll = Math.max(...rolls.map(Math.abs));
      const maxPitch = Math.max(...pitches.map(Math.abs));
      const exceeds = maxRoll > 25 || maxPitch > 30;
      const rollStability = Math.max(0, 100 - Math.abs(rolls.at(-1)) * 3);
      const pitchStability = Math.max(0, 100 - Math.abs(pitches.at(-1)) * 2);
      this.predictions.stabilityScore = Math.round((rollStability + pitchStability) / 2);
      if(isSkidding || exceeds){ this.predictions.riskLevel = 'HIGH'; this.predictions.driftWarning = true; }
      else if(this.predictions.stabilityScore < 60){ this.predictions.riskLevel = 'MEDIUM'; this.predictions.driftWarning = false; }
      else { this.predictions.riskLevel = 'LOW'; this.predictions.driftWarning = false; }
    },
    generateInsights(topSpeed, gear, detections, motionSpeed){
      this.analyzePatterns();
      const insights = [];
      if(detections.length){
        const top = detections[0];
        if(top.confidence === 'high') insights.push({ type: 'warning', text: `📍 HIGH: ${top.class} detected ahead (${top.score}%)` });
      }
      if(motionSpeed > topSpeed * 0.85) insights.push({ type: 'warning', text: '⚠ Approaching speed limit (Motion Sensor). Decelerate.' });
      else if(motionSpeed > topSpeed * 0.6 && this.predictions.driftWarning) insights.push({ type: 'danger', text: '🔴 CRITICAL: Skid detected at high speed. Reduce throttle.' });
      if(this.predictions.stabilityScore < 70) insights.push({ type: 'warning', text: '⚠ Low stability index. Uneven terrain.' });
      if(insights.length === 0 && this.buffer.speeds.length > 10) insights.push({ type: 'success', text: '✓ All systems optimal. AI: ACTIVE' });
      return insights.slice(0, 4);
    }
  };

  /* ============================
     Media & Sensors
     ============================ */
  const elements = {
    cameraStream: document.getElementById('cameraStream'),
    detectionCanvas: document.getElementById('detectionCanvas'),
    speedText: document.getElementById('speedText'),
    speedDial: document.getElementById('speedDial'),
    speedSource: document.getElementById('speedSource'),
    pitchText: document.getElementById('pitchText'),
    rollText: document.getElementById('rollText'),
    detectionCount: document.getElementById('detectionCount'),
    aiInsights: document.getElementById('aiInsights'),
    aiBadge: document.getElementById('aiBadge'),
    gpuBadge: document.getElementById('gpuBadge'),
    telemetryId: document.getElementById('telemetryId'),
    rpmText: document.getElementById('rpmText')
  };

  /* ============================
     Camera & Stream Setup
     ============================ */
  async function startCamera(facingMode = 'environment'){
    try {
      const constraints = { audio: false, video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      elements.cameraStream.srcObject = stream;
      ConfigEngine.state.activeFacingMode = facingMode;
      return true;
    } catch(e){
      console.error('Camera error', e);
      return false;
    }
  }

  /* ============================
     Device Motion (mobile) handling
     ============================ */
  function attachMotionListeners(){
    if(window.DeviceMotionEvent){
      window.addEventListener('devicemotion', (ev) => {
        const a = ev.accelerationIncludingGravity || ev.acceleration || { x:0,y:0,z:0 };
        MotionSpeedometer.recordAcceleration(a.x || 0, a.y || 0, a.z || 0);
      }, { passive: true });
    }
    if(window.DeviceOrientationEvent){
      window.addEventListener('deviceorientation', (ev) => {
        const pitch = ev.beta || 0; const roll = ev.gamma || 0;
        elements.pitchText.textContent = pitch.toFixed(1) + '°';
        elements.rollText.textContent = roll.toFixed(1) + '°';
        SensorAI.recordSensorData(MotionSpeedometer.getSpeed(), pitch, roll, MotionSpeedometer.accelHistory.at(-1) || 0);
      }, { passive: true });
    }
  }

  /* ============================
     Rendering Loop & AI Update
     ============================ */
  let rafRef = null;
  async function renderLoop(){
    // Speed rendering
    const speed = MotionSpeedometer.getSpeed();
    elements.speedText.textContent = speed.toFixed(2);
    const dashOffset = 258 - (speed / ConfigEngine.performance.topSpeed) * 258;
    elements.speedDial.style.strokeDashoffset = dashOffset;
    elements.speedSource.textContent = 'MOTION';

    // RPM mock (derived)
    elements.rpmText.textContent = Math.round(speed * 40) + ' RPM';

    // AI detection (throttle to ~10 FPS)
    if(ObjectDetectionAI.isModelLoaded && elements.cameraStream.readyState >= 2){
      // run detection every N frames
      if(Math.random() < 0.18){ // simple throttle
        const detections = await ObjectDetectionAI.detectObjects(elements.cameraStream);
        ObjectDetectionAI.drawDetections(elements.detectionCanvas, detections, elements.cameraStream);
        elements.detectionCount.textContent = detections.length;
        // update insights
        const insights = SensorAI.generateInsights(ConfigEngine.performance.topSpeed, ConfigEngine.state.gear, detections, speed);
        updateInsightsPanel(insights);
      }
    }

    rafRef = requestAnimationFrame(renderLoop);
  }

  function updateInsightsPanel(insights){
    const panel = elements.aiInsights;
    panel.innerHTML = '';
    if(!insights || !insights.length){
      panel.innerHTML = '<div class="small">AI Engine: Analyzing...</div>';
      elements.aiBadge.textContent = 'AI: PROCESSING';
      elements.aiBadge.style.background = 'linear-gradient(90deg,#6b21a8,#0ea5a4)';
      return;
    }
    // set AI badge color by risk
    const risk = SensorAI.predictions.riskLevel;
    elements.aiBadge.textContent = 'AI: ' + risk;
    elements.aiBadge.style.background = risk === 'HIGH' ? '#3b0f0f' : risk === 'MEDIUM' ? '#4b2b00' : '#073b1a';

    insights.forEach(i => {
      const div = document.createElement('div');
      div.className = 'insight ' + (i.type || '');
      div.textContent = i.text;
      panel.appendChild(div);
    });
    panel.scrollTop = panel.scrollHeight;
  }

  /* ============================
     UI Events
     ============================ */
  document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('settingsModal').classList.remove('hidden');
    document.getElementById('inputTopSpeed').value = ConfigEngine.performance.topSpeed;
    document.getElementById('inputAISensitivity').value = ConfigEngine.performance.aiSensitivity;
    document.getElementById('inputDetectionThreshold').value = ConfigEngine.performance.detectionThreshold;
    document.getElementById('inputMotionFactor').value = ConfigEngine.performance.motionFactor;
  });
  document.getElementById('closeSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
  document.getElementById('saveSettings').addEventListener('click', () => {
    ConfigEngine.performance.topSpeed = parseFloat(document.getElementById('inputTopSpeed').value) || 30;
    ConfigEngine.performance.aiSensitivity = parseInt(document.getElementById('inputAISensitivity').value) || 75;
    ConfigEngine.performance.detectionThreshold = parseFloat(document.getElementById('inputDetectionThreshold').value) || 0.5;
    ConfigEngine.performance.motionFactor = parseFloat(document.getElementById('inputMotionFactor').value) || 1.0;
    MotionSpeedometer.motionFactor = ConfigEngine.performance.motionFactor;
    document.getElementById('settingsModal').classList.add('hidden');
  });

  document.getElementById('previewBtn').addEventListener('click', async () => {
    // toggle facing mode
    const next = ConfigEngine.state.activeFacingMode === 'environment' ? 'user' : 'environment';
    await startCamera(next);
  });

  document.getElementById('findBtn').addEventListener('click', () => {
    // Peer discovery stub (non-blocking)
    console.log('Find pressed — initiating local discovery (stub)');
    // In production: broadcast via PeerJS and sync clocks
  });

  document.getElementById('disconnectBtn').addEventListener('click', () => {
    // stop streams and cancel loops
    const s = elements.cameraStream.srcObject;
    if(s && s.getTracks) s.getTracks().forEach(t => t.stop());
    if(rafRef) cancelAnimationFrame(rafRef);
    elements.aiInsights.innerHTML = '<div class="small">Disconnected</div>';
    elements.gpuBadge.textContent = 'GPU: OFF';
    elements.aiBadge.textContent = 'AI: OFF';
  });

  document.getElementById('calibBtn').addEventListener('click', () => {
    // simple calibration: clear motion history and set tilt offset
    MotionSpeedometer.clear();
    SensorAI.buffer = { speeds: [], pitches: [], rolls: [], accels: [] };
    elements.aiInsights.innerHTML = '<div class="small">Calibration complete</div>';
  });

  document.getElementById('resetBtn').addEventListener('click', () => location.reload());

  /* ============================
     Initialization
     ============================ */
  (async function init(){
    // GPU init
    await GPUAccelerator.initialize();

    // start camera (best-effort)
    await startCamera('environment');

    // attach motion listeners (if available)
    attachMotionListeners();

    // load model with retries
    await ObjectDetectionAI.initialize(3);

    // set initial config
    MotionSpeedometer.motionFactor = ConfigEngine.performance.motionFactor;

    // start render loop
    renderLoop();

    // small heartbeat
    setInterval(() => {
      document.getElementById('telemetryId').textContent = 'ID: ' + ConfigEngine.auth.sessionId;
    }, 2000);
  })();

  /* ============================
     Safety & Guards
     - prevent canvas errors when video not ready
     - limit detectionHistory size
     ============================ */
  // Periodic cleanup
  setInterval(() => {
    if(ObjectDetectionAI.detectionHistory.length > ObjectDetectionAI.maxHistorySize){
      ObjectDetectionAI.detectionHistory = ObjectDetectionAI.detectionHistory.slice(-ObjectDetectionAI.maxHistorySize);
    }
  }, 5000);

  /* ============================
     End of script
     ============================ */
  </script>
</body>
</html>
